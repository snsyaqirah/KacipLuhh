services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # no external port — backend accesses redis via Docker network

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file: ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379   # override .env value — redis = service name above
    depends_on:
      - redis
    volumes:
      - ./backend/src:/app/src        # hot reload — changes reflect without rebuild
      - backend_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - frontend_modules:/app/node_modules
    env_file: ./frontend/.env

volumes:
  backend_modules:
  frontend_modules:
